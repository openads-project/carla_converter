services:

  carla-converter:
    image: ghcr.io/openads-project/carla_converter:v1.2.1
    environment:
      # --- name ------
      NAMESPACE: /
      NAME: carla_converter
      # --- outputs ---
      OBJECT_LIST_TOPIC: ~/object_list
      TRAFFIC_LIGHTS_TOPIC: ~/traffic_lights
      MAP_INFO_TOPIC: ~/map_info
      # --- other -----
      LOG_LEVEL: ${LOG_LEVEL:-info}
      USE_SIM_TIME: ${USE_SIM_TIME:-true}
      PARAMS: ${PARAMS:-/docker-ros/ws/install/carla_converter/share/carla_converter/config/params.yml}
    command:
      - /bin/bash
      - -ic
      - |
        ros2 launch carla_converter carla_converter.launch.py \
          namespace:=$${NAMESPACE} \
          name:=$${NAME} \
          log_level:=$${LOG_LEVEL} \
          use_sim_time:=$${USE_SIM_TIME} \
          params:=$${PARAMS} \
          object_list_topic:=$${OBJECT_LIST_TOPIC} \
          traffic_lights_topic:=$${TRAFFIC_LIGHTS_TOPIC} \
          map_info_topic:=$${MAP_INFO_TOPIC}
    # volumes:
    #   - ./params.yml:/docker-ros/ws/install/carla_converter/share/carla_converter/config/params.yml
