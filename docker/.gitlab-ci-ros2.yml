include:
  - remote: 'https://raw.githubusercontent.com/ika-rwth-aachen/docker-ros/main/.gitlab-ci/docker-ros.yml'

variables:
  BASE_IMAGE: rwthika/ros:foxy
  COMMAND: ros2 launch carla_its_converter carla_its_converter.launch.py
